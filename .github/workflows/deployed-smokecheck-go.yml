name: Deployed API Smokecheck (Go)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *" # daily, UTC

jobs:
  smokecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache-dependency-path: tools/smokecheck-go/go.mod

      - name: Go format check
        working-directory: tools/smokecheck-go
        run: |
          test -z "$(gofmt -l .)"

      - name: Go vet
        working-directory: tools/smokecheck-go
        run: go vet ./...

      - name: Go test
        working-directory: tools/smokecheck-go
        run: go test ./...

      - name: Run smokecheck
        working-directory: tools/smokecheck-go
        env:
          DEPLOYED_HEALTH_URL: ${{ secrets.DEPLOYED_HEALTH_URL }}
        run: |
          go mod tidy
          go run .

      - name: Notify Slack on smokecheck failure
        if: failure()
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: |
              🚨 Deployed smokecheck FAILED
              Repo: ${{ github.repository }}
              Workflow: ${{ github.workflow }}
              Branch: ${{ github.ref_name }}
              Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}