name: Deployed API Smokecheck (Go)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *" # daily, UTC

jobs:
  smokecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: tools/smokecheck-go/go.mod

      - name: Run smokecheck
        working-directory: tools/smokecheck-go
        env:
          DEPLOYED_HEALTH_URL: ${{ secrets.DEPLOYED_HEALTH_URL }}
        run: |
          go mod tidy
          go run .

      - name: Intentional fail (temporary test)
        run: exit 1

      - name: Notify Slack on smokecheck failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook        
          payload: |
            text: "🚨 Deployed smokecheck FAILED\nRepo: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}\nBranch: ${{ github.ref_name }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
